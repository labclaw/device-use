name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: [self-hosted, linux]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@a2a8b00df0aa22a77a33ee5f956c2128661fabeb # v7

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run pip-audit
        run: uv run pip-audit

  bandit-sast:
    name: Bandit SAST
    runs-on: [self-hosted, linux]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@a2a8b00df0aa22a77a33ee5f956c2128661fabeb # v7

      - name: Install bandit
        run: uv tool install bandit

      - name: Run Bandit
        run: bandit -r src/ -c pyproject.toml || bandit -r src/ -ll

  secrets-scan:
    name: Secrets Scan
    runs-on: [self-hosted, linux]
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907e6e0691f0b1 # v2.3.8
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
