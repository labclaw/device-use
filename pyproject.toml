[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "device-use"
version = "0.1.0"
description = "Like browser-use, but for scientific instruments — GUI agent framework for lab software"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "pillow>=10.0",
    "pyautogui>=0.9",
    "pyperclip>=1.8",
    "mss>=9.0",
    "anthropic>=0.40",
    "openai>=1.0",
    "backoff>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
]

[project.scripts]
device-use = "device_use.cli:main"

[project.entry-points."labclaw.plugins"]
device_use = "device_use.integrations.labclaw:create_plugin"

[tool.hatch.build.targets.wheel]
packages = ["src/device_use"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
